    faq:
      - q: "Fournissez-vous une attestation ?"
        a: "Oui (si applicable à votre prestation)."
      - q: "Quelle fréquence ?"
        a: "Selon appareil et usage. On vous indique la recommandation."
      - q: "Combien de temps ça dure ?"
        a: "On confirme selon installation."
      - q: "Zone d’intervention ?"
        a: "[Zone]."
      - q: "Tarifs ?"
        a: "Selon type d’appareil et accès, annoncés avant."
      - q: "Préparation avant venue ?"
        a: "Accès dégagé autour de l’appareil."
      - q: "Intervenez-vous en urgence ?"
        a: "Rarement urgent, mais on propose un créneau rapide."
      - q: "Quels infos envoyer ?"
        a: "Type d’appareil + photo si possible."
