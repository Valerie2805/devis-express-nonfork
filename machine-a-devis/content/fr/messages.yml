      sms: "Pour vous orienter : surface (m²) ? maison/appartement ? installation ou dépannage/entretien ?"
      whatsapp: "Pour vous orienter : surface (m²) ? maison/appartement ? installation ou dépannage/entretien ?"
    need_photo:
      sms: "Si dépannage : envoyez 1 photo de l’unité (intérieure/extérieure) et, si possible, du message d’erreur."
      whatsapp: "Si dépannage : envoyez 1 photo de l’unité (intérieure/extérieure) et, si possible, du message d’erreur."

  vitrier:
    need_photo:
      sms: "Bonjour [Prénom], pouvez-vous envoyer 1 photo de la vitre (ou du cadre) et préciser si vous avez besoin d’une mise en sécurité immédiate ?"
      whatsapp: "Bonjour [Prénom], pouvez-vous envoyer 1 photo de la vitre (ou du cadre) et préciser si vous avez besoin d’une mise en sécurité immédiate ?"
    safety:
      sms: "Évitez de manipuler les éclats. Si possible, éloignez enfants/animaux et sécurisez la zone."
      whatsapp: "Évitez de manipuler les éclats. Si possible, éloignez enfants/animaux et sécurisez la zone."

  debouchage_assainissement:
    quick_questions:
      sms: "Bonjour [Prénom], c’est plutôt WC, évier/douche ou colonne ? Refoulement/débordement oui/non ? maison ou appartement ?"
      whatsapp: "Bonjour [Prénom], c’est plutôt WC, évier/douche ou colonne ? Refoulement/débordement oui/non ? maison ou appartement ?"
    need_photo:
      sms: "Si possible, envoyez 1 photo de l’évacuation concernée (ou du regard si accessible) + indiquez l’étage."
      whatsapp: "Si possible, envoyez 1 photo de l’évacuation concernée (ou du regard si accessible) + indiquez l’étage."

  volets_portes_garage:
    need_photo:
      sms: "Bonjour [Prénom], envoyez 1 photo du volet/porte et précisez : bloqué ouvert ou fermé ? manuel ou électrique ?"
      whatsapp: "Bonjour [Prénom], envoyez 1 photo du volet/porte et précisez : bloqué ouvert ou fermé ? manuel ou électrique ?"
    safety:
      sms: "Si volet bloqué ouvert, évitez de forcer. Dites-moi l’adresse, on priorise si c’est un sujet de sécurité."
      whatsapp: "Si volet bloqué ouvert, évitez de forcer. Dites-moi l’adresse, on priorise si c’est un sujet de sécurité."

  anti_nuisibles:
    quick_questions:
      sms: "Bonjour [Prénom], quel nuisible (rats/souris, cafards, punaises, guêpes/frelons) et dans quelle pièce ?"
      whatsapp: "Bonjour [Prénom], quel nuisible (rats/souris, cafards, punaises, guêpes/frelons) et dans quelle pièce ?"
    need_photo:
      sms: "Si possible, envoyez 1 photo. Pour punaises : nombre de pièces touchées ?"
      whatsapp: "Si possible, envoyez 1 photo. Pour punaises : nombre de pièces touchées ?"
    safety:
      sms: "Pour guêpes/frelons : gardez vos distances et évitez toute manipulation. Envoyez une photo du nid si possible."
      whatsapp: "Pour guêpes/frelons : gardez vos distances et évitez toute manipulation. Envoyez une photo du nid si possible."

  ramonage_poeles_cheminees:
    quick_questions:
      sms: "Bonjour [Prénom], quel appareil (poêle/cheminée/chaudière) et avez-vous besoin d’une attestation ?"
      whatsapp: "Bonjour [Prénom], quel appareil (poêle/cheminée/chaudière) et avez-vous besoin d’une attestation ?"
    need_photo:
      sms: "Si possible, envoyez 1 photo de l’appareil et de l’accès (conduit/porte)."
      whatsapp: "Si possible, envoyez 1 photo de l’appareil et de l’accès (conduit/porte)."
