      - id: refoulement_oui_non
        label: "Refoulement / débordement ?"
        required: true
        type: boolean
        maps_to:
          answers.refoulement_oui_non: answers.refoulement_oui_non
    required_photos_for:
      - refoulement

  volets_portes_garage:
    request_types:
      volet_bloque_ouvert: "Volet bloqué ouvert"
      volet_bloque_ferme: "Volet bloqué fermé"
      moteur_panne: "Moteur / panne"
      porte_garage_bloquee: "Porte de garage bloquée"
      remplacement: "Remplacement"
    extra_fields:
      - id: bloque_ouvert_ou_ferme
        label: "C’est bloqué…"
        required: true
        type: enum
        options:
          - ouvert
          - ferme
        maps_to:
          answers.bloque_ouvert_ou_ferme: answers.bloque_ouvert_ou_ferme
      - id: manuel_ou_electrique
        label: "Type"
        required: true
        type: enum
        options:
          - manuel
          - electrique
        maps_to:
          answers.manuel_ou_electrique: answers.manuel_ou_electrique
    required_photos_for:
      - volet_bloque_ouvert
      - moteur_panne
      - porte_garage_bloquee

  anti_nuisibles:
    request_types:
      guepes_frelons: "Guêpes / frelons"
      punaises: "Punaises de lit"
      rats_souris: "Rats / souris"
      cafards: "Cafards"
      autre: "Autre"
    extra_fields:
      - id: type_nuisible
        label: "Nuisible"
        required: true
        type: enum
        options:
          - guepes_frelons
          - punaises
          - rats_souris
          - cafards
          - autre
        maps_to:
          answers.type_nuisible: answers.type_nuisible
      - id: piece
        label: "Pièce concernée"
        required: true
        type: string
        maps_to:
          answers.piece: answers.piece
      - id: pieces_concernees
        label: "Nombre de pièces concernées (punaises)"
        required: false
        type: number
        maps_to:
          answers.pieces_concernees: answers.pieces_concernees
    required_photos_for:
      - guepes_frelons

  ramonage_poeles_cheminees:
    request_types:
      ramonage: "Ramonage"
      diagnostic_tirage: "Diagnostic tirage / fumées"
      entretien: "Entretien"
    extra_fields:
      - id: type_appareil
        label: "Type d’appareil"
