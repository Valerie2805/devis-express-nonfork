          - cheminee
          - chaudiere
        maps_to:
          answers.type_appareil: answers.type_appareil
      - id: attestation_necessaire
        label: "Attestation nécessaire ?"
        required: true
        type: boolean
        maps_to:
          answers.attestation_necessaire: answers.attestation_necessaire
